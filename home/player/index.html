<html>
<head>
	<meta charset="UTF-8">
	<title>请在地址栏输入url参数  "?url=视频地址"</title>
</head>
<body>
      <div id="video_div" style="width: 100%;height: 100%;"></div>
</body>
<script src="uplayer.min.js"></script>
<script>
      let url = new URL(window.location.href).searchParams.get('url');
      play(url, "video_div", "hls");
</script>

</html>
